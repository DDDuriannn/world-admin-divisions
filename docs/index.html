<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界行政区划检索 · World Administrative Divisions</title>
<meta name="description" content="全球 252 国行政区划数据库（最多 5 级，44 万条），含中国省/市/县/乡精确数据，支持中/英/本地三语级联检索。数据来源 GADM + GeoNames + modood。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <span class="logo">🌐</span>
      <div>
        <h1 id="t-title">世界行政区划检索</h1>
        <p id="t-subtitle" class="subtitle">选择国家，逐级筛选行政区划</p>
      </div>
    </div>
    <div class="lang-switch" id="lang-switch">
      <span class="lang-label" id="t-lang-label">语言</span>
      <button class="lang-btn" data-lang="zh" id="t-lang-zh">中文</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="local" id="t-lang-local">本地</button>
    </div>
  </header>

  <main class="card">
    <div class="field">
      <label id="t-country-label">国家 / 地区</label>
      <div class="select-wrap">
        <select id="country"><option value="">— · —</option></select>
      </div>
    </div>

    <div id="levels" class="levels"></div>

    <div id="detail" class="detail hidden"></div>

    <div class="search-row">
      <input id="q" type="text" placeholder="搜索…">
      <button id="search-btn" class="primary-btn">搜索</button>
    </div>
    <div id="search-results" class="search-results"></div>
  </main>

  <footer>
    <span id="stats"></span>
    <span class="lang-hint" id="t-lang-hint"></span>
  </footer>
</div>

<script>
const $ = s => document.querySelector(s);
let lang = localStorage.getItem('lang') || 'zh';
let texts = {};
let currentCountry = '';
let countries = [];          // from countries.json
let countryData = null;      // loaded regions for current country
let byCode = {};             // code -> region
let childrenByParent = {};   // parent_code -> [region,...]
let countryMaxLevel = 0;

// 界面文案（与后端 I18N 一致）
const I18N = {
  zh: {
    title: "世界行政区划检索", subtitle: "选择国家，逐级筛选行政区划",
    select_country: "国家 / 地区", loading: "加载中", please_select: "请选择",
    select_parent: "请选择上级", level: "第 {n} 级", search_placeholder: "搜索：选了国家搜该国，未选则搜国名",
    search_btn: "搜索", no_result: "无匹配结果", found_n: "找到 {n} 条（最多显示100）",
    no_subdiv: "该国无下级行政区划数据。", n_countries: "共 {n} 个国家/地区 · 441,871 条区划",
    f_path: "完整路径", f_level: "层级", f_code: "代码", f_parent: "上级代码",
    f_country: "国家", f_source: "数据来源", country_root: "(国家根)",
    lang_label: "语言", lang_zh: "中文", lang_en: "English", lang_local: "本地",
    lang_hint: "中=中文 / EN=英文 / 本地=各国本地语言",
    search_country_hint: "输入国名跳转（需先选国家才能搜区划）",
  },
  en: {
    title: "World Administrative Divisions", subtitle: "Pick a country, drill down by level",
    select_country: "Country / Region", loading: "Loading", please_select: "Select",
    select_parent: "Select parent first", level: "Level {n}", search_placeholder: "Search: within selected country, or country name if none",
    search_btn: "Search", no_result: "No matches", found_n: "Found {n} (max 100)",
    no_subdiv: "No subdivisions for this country.", n_countries: "{n} countries/regions · 441,871 divisions",
    f_path: "Path", f_level: "Level", f_code: "Code", f_parent: "Parent code",
    f_country: "Country", f_source: "Source", country_root: "(country root)",
    lang_label: "Language", lang_zh: "中文", lang_en: "English", lang_local: "Local",
    lang_hint: "ZH=Chinese / EN=English / Local=native language",
    search_country_hint: "Type a country name to jump (select a country first to search divisions)",
  },
};
I18N.local = JSON.parse(JSON.stringify(I18N.en));

// 语言 → 名称列优先顺序
const LANG_COLS = {
  zh: ["name_zh", "name", "name_en"],
  en: ["name_en", "name"],
  local: ["name_local", "name", "name_en"],
};

function flagEmoji(iso2){
  if(!iso2 || iso2.length!==2) return '';
  try{ return String.fromCodePoint(...[...iso2.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65)); }
  catch(e){ return ''; }
}

function displayName(obj, lang){
  const cols = LANG_COLS[lang] || ["name"];
  for(const c of cols){ const v=obj[c]; if(v) return v; }
  return obj.name || obj.name_en || obj.code || '';
}

function T(key, vars){
  let s = (texts[key] || key);
  if(vars) for(const k in vars) s = s.replace('{'+k+'}', vars[k]);
  return s;
}

function applyTexts(){
  document.title = T('title');
  $('#t-title').textContent = T('title');
  $('#t-subtitle').textContent = T('subtitle');
  $('#t-country-label').textContent = T('select_country');
  $('#q').placeholder = T('search_placeholder');
  $('#search-btn').textContent = T('search_btn');
  $('#t-lang-label').textContent = T('lang_label');
  $('#t-lang-zh').textContent = T('lang_zh');
  $('#t-lang-local').textContent = T('lang_local');
  $('#t-lang-hint').textContent = T('lang_hint');
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===lang);
  });
  texts = I18N[lang];
  renderCountries();
  if(currentCountry){ renderLevels(); }
}

function init(){
  texts = I18N[lang];
  applyTexts();
  loadCountries();
}

async function loadCountries(){
  const res = await fetch('data/countries.json').then(r=>r.json());
  countries = res;
  renderCountries();
}

function renderCountries(){
  if(!countries.length) return;
  const sel = $('#country');
  const prev = currentCountry;
  sel.innerHTML = '<option value="">— '+T('please_select')+' —</option>';
  countries.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.iso2;
    const f=flagEmoji(c.iso2);
    const lvl=c.max_level?` · ${c.max_level}L`:'';
    o.textContent=`${f} ${displayName(c,lang)} [${c.iso2}]${lvl}`;
    sel.appendChild(o);
  });
  if(prev) sel.value=prev;
  $('#stats').textContent = T('n_countries',{n:countries.length});
}

$('#country').addEventListener('change', async e=>{
  currentCountry=e.target.value;
  $('#levels').innerHTML='';
  $('#detail').classList.add('hidden');
  $('#detail').innerHTML='';
  $('#search-results').innerHTML='';
  countryData=null; byCode={}; childrenByParent={};
  if(!currentCountry) return;
  // fetch this country's data
  try{
    countryData = await fetch(`data/${currentCountry}.json`).then(r=>r.json());
  }catch(err){
    $('#levels').innerHTML=`<p class="hint">${T('loading')}…</p>`;
    return;
  }
  // build maps
  countryData.forEach(r=>{
    byCode[r.code]=r;
    const p=r.parent_code||'__root__';
    (childrenByParent[p]=childrenByParent[p]||[]).push(r);
  });
  // max level
  countryMaxLevel=0;
  countries.forEach(c=>{ if(c.iso2===currentCountry) countryMaxLevel=c.max_level||0; });
  if(countryMaxLevel===0){
    $('#levels').innerHTML=`<p class="hint">${T('no_subdiv')}</p>`;
    return;
  }
  renderLevels();
  // auto-load first level
  loadLevel(1,'__root__');
});

function renderLevels(){
  $('#levels').innerHTML='';
  for(let lv=1;lv<=countryMaxLevel;lv++){
    const box=document.createElement('div');
    box.className='field';
    box.innerHTML=`<label>${T('level',{n:lv})}</label>
      <div class="select-wrap"><select id="lv${lv}" data-level="${lv}" disabled><option value="">— ${T('loading')} —</option></select></div>`;
    $('#levels').appendChild(box);
    $(`#lv${lv}`).addEventListener('change', onLevelChange);
  }
}

function getChildren(parent){
  return (childrenByParent[parent]||[]).slice().sort((a,b)=>{
    const na=displayName(a,lang), nb=displayName(b,lang);
    return na.localeCompare(nb, 'en', {numeric:true, sensitivity:'base'});
  });
}

function loadLevel(level,parent){
  const sel=$(`#lv${level}`);
  if(!sel) return;
  sel.disabled=true;
  sel.innerHTML=`<option value="">— ${T('please_select')} —</option>`;
  const data=getChildren(parent);
  data.forEach(r=>{
    const o=document.createElement('option');
    o.value=r.code;
    o.textContent=`${displayName(r,lang)}${r.level_name?' · '+r.level_name:''}`;
    sel.appendChild(o);
  });
  sel.disabled=false;
  clearBelow(level);
}

function clearBelow(level){
  for(let lv=level+1;lv<=countryMaxLevel;lv++){
    const s=$(`#lv${lv}`);
    if(s){s.innerHTML=`<option value="">— ${T('select_parent')} —</option>`;s.disabled=true;}
  }
}

function onLevelChange(e){
  const level=parseInt(e.target.dataset.level);
  const code=e.target.value;
  clearBelow(level);
  if(!code){$('#detail').classList.add('hidden');return;}
  const nextSel=$(`#lv${level+1}`);
  if(nextSel) loadLevel(level+1,code);
  showDetail(code);
}

function showDetail(code){
  const reg=byCode[code];
  if(!reg){$('#detail').classList.add('hidden');return;}
  // build chain walking parent_code
  const chain=[];
  let cur=reg;
  while(cur){
    chain.unshift(cur);
    cur = cur.parent_code ? byCode[cur.parent_code] : null;
  }
  const chainStr = chain.map(c=>displayName(c,lang)).join('  ›  ');
  // country object for country name
  const cobj = countries.find(c=>c.iso2===currentCountry) || {};
  const d=$('#detail');
  d.classList.remove('hidden');
  d.innerHTML=`
    <div class="detail-head">
      <span class="flag">${flagEmoji(currentCountry)}</span>
      <h3>${displayName(reg,lang)}</h3>
    </div>
    <table>
      <tr><td>${T('f_path')}</td><td class="chain">${chainStr}</td></tr>
      <tr><td>${T('f_level')}</td><td>${T('level',{n:reg.level})} · ${reg.level_name||'-'}</td></tr>
      <tr><td>${T('f_code')}</td><td><code>${reg.code}</code></td></tr>
      <tr><td>${T('f_parent')}</td><td><code>${reg.parent_code||T('country_root')}</code></td></tr>
      <tr><td>${T('f_country')}</td><td>${displayName(cobj,lang)} [${currentCountry}]</td></tr>
      <tr><td>${T('f_source')}</td><td>${reg.source||'-'}</td></tr>
    </table>`;
}

$('#search-btn').addEventListener('click', doSearch);
$('#q').addEventListener('keydown', e=>{if(e.key==='Enter') doSearch();});

function doSearch(){
  const q=$('#q').value.trim();
  if(!q) return;
  const box=$('#search-results');
  if(!currentCountry || !countryData){
    // search country names → jump
    const ql=q.toLowerCase();
    const matches=countries.filter(c=>{
      return [c.name_en,c.name_zh,c.name_local].some(v=>v && v.toLowerCase().includes(ql));
    });
    if(!matches.length){ box.innerHTML=`<p class="hint">${T('no_result')}</p>`; return; }
    box.innerHTML=`<p class="hint">${T('found_n',{n:matches.length})}</p>`;
    const list=document.createElement('div'); list.className='result-list';
    matches.slice(0,100).forEach(c=>{
      const item=document.createElement('div'); item.className='result-item';
      item.innerHTML=`<span class="r-flag">${flagEmoji(c.iso2)}</span>
        <div class="r-body"><span class="r-name">${displayName(c,lang)}</span>
        <span class="r-meta">${c.iso2} · ${c.max_level||0}L</span></div>`;
      item.addEventListener('click',()=>{
        $('#country').value=c.iso2;
        $('#country').dispatchEvent(new Event('change'));
      });
      list.appendChild(item);
    });
    box.appendChild(list);
    return;
  }
  // search within loaded country
  const ql=q.toLowerCase();
  const matches=countryData.filter(r=>{
    return [r.name,r.name_zh,r.name_local,r.short_name].some(v=>v && v.toLowerCase().includes(ql));
  });
  if(!matches.length){ box.innerHTML=`<p class="hint">${T('no_result')}</p>`; return; }
  box.innerHTML=`<p class="hint">${T('found_n',{n:matches.length})}</p>`;
  const list=document.createElement('div'); list.className='result-list';
  matches.slice(0,100).forEach(r=>{
    const item=document.createElement('div'); item.className='result-item';
    item.innerHTML=`<span class="r-flag">${flagEmoji(currentCountry)}</span>
      <div class="r-body"><span class="r-name">${displayName(r,lang)}</span>
      <span class="r-meta">${T('level',{n:r.level})} ${r.level_name||''} · <code>${r.code}</code></span></div>`;
    item.addEventListener('click',()=>{ showDetail(r.code); });
    list.appendChild(item);
  });
  box.appendChild(list);
}

document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    lang=b.dataset.lang;
    localStorage.setItem('lang',lang);
    applyTexts();
  });
});

init();
</script>
</body>
</html>
